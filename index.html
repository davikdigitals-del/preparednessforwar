<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Prevent mobile browsers from serving stale cached version -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Preparedness for War</title>
    <meta name="description" content="Preparedness for War - Comprehensive preparedness intelligence platform">
    <meta name="author" content="Preparedness for War" />

    <!-- Allow browser built-in translation (Chrome, Safari, Edge) -->
    <!-- Do NOT add <meta name="google" content="notranslate"> -->

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1e40af">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PrepForWar">

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Preparedness for War">
    <meta property="og:description" content="Preparedness for War - Comprehensive preparedness intelligence platform">
    <meta property="og:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/ba9ebb98-ba96-46d5-b656-5b56fdd724c5/id-preview-94056b60--c53a0ef3-c395-4e6b-a0ec-e90ca64062a3.lovable.app-1772414540507.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Preparedness for War">
    <meta name="twitter:description" content="Preparedness for War - Comprehensive preparedness intelligence platform">
    <meta name="twitter:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/ba9ebb98-ba96-46d5-b656-5b56fdd724c5/id-preview-94056b60--c53a0ef3-c395-4e6b-a0ec-e90ca64062a3.lovable.app-1772414540507.png">

    <!--
      Set lang attribute from saved preference before React loads.
      This ensures browser translation triggers correctly on first paint.
    -->
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('prw-lang');
          if (saved) {
            document.documentElement.lang = saved;
            document.documentElement.dir = saved === 'ar' ? 'rtl' : 'ltr';
          }
        } catch(e) {}
      })();
    </script>
  </head>

  <body>
    <!-- Google Translate element — OUTSIDE #root so GT never touches React's DOM -->
    <div id="google_translate_element" style="display:none"></div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Google Translate Widget — loads after React -->
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          autoDisplay: false,
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE
        }, 'google_translate_element');
      }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async defer></script>
  </body>
</html>
