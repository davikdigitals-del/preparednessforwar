<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Prevent Android Chrome Force Dark Mode from inverting the page -->
    <meta name="color-scheme" content="light only" />
    <meta name="supported-color-schemes" content="light" />
    <title>Preparedness for War</title>
    <meta name="description" content="Preparedness for War - Comprehensive preparedness intelligence platform">
    <meta name="theme-color" content="#1e40af">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PrepForWar">
    <link rel="manifest" href="/manifest.json">

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Preparedness for War">
    <meta property="og:description" content="Preparedness for War - Comprehensive preparedness intelligence platform">
    <meta property="og:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/ba9ebb98-ba96-46d5-b656-5b56fdd724c5/id-preview-94056b60--c53a0ef3-c395-4e6b-a0ec-e90ca64062a3.lovable.app-1772414540507.png">
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Preparedness for War">
    <meta name="twitter:description" content="Preparedness for War - Comprehensive preparedness intelligence platform">
    <meta name="twitter:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/ba9ebb98-ba96-46d5-b656-5b56fdd724c5/id-preview-94056b60--c53a0ef3-c395-4e6b-a0ec-e90ca64062a3.lovable.app-1772414540507.png">

    <script>
      try {
        var s = localStorage.getItem('prw-lang');
        if (s) { document.documentElement.lang = s; document.documentElement.dir = s === 'ar' ? 'rtl' : 'ltr'; }
      } catch(e) {}
    </script>

    <style>
      body { margin: 0; background: #ffffff; color-scheme: light only; }
      #root { min-height: 100vh; background: #ffffff; }
      html { color-scheme: light only; background: #ffffff; }
      #loader { position: fixed; inset: 0; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 9999; }
      #loader-spin { width: 36px; height: 36px; border: 4px solid #e5e7eb; border-top-color: #1d4ed8; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>

  <body>
    <!-- Loading screen — removed by React after mount -->
    <div id="loader"><div id="loader-spin"></div></div>

    <!-- Google Translate container — outside React root -->
    <div id="google_translate_element" style="display:none;position:absolute"></div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- Google Translate — loaded last, async, won't block page -->
    <script>
      window.googleTranslateElementInit = function() {
        try {
          new window.google.translate.TranslateElement({
            pageLanguage: 'en', autoDisplay: false
          }, 'google_translate_element');
        } catch(e) {}
      };
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async defer></script>
  </body>
</html>
