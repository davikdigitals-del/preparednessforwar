    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-title" content="PrepForWar">
    <link rel="manifest" href="/manifest.json">

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Preparedness for War">
    <meta property="og:description" content="Preparedness for War - Comprehensive preparedness intelligence platform">
    <meta property="og:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/ba9ebb98-ba96-46d5-b656-5b56fdd724c5/id-preview-94056b60--c53a0ef3-c395-4e6b-a0ec-e90ca64062a3.lovable.app-1772414540507.png">
    <meta name="twitter:card" content="summary_large_image" />

    <script>
      try {
        var s = localStorage.getItem('prw-lang');
        if (s) { document.documentElement.lang = s; document.documentElement.dir = s === 'ar' ? 'rtl' : 'ltr'; }
      } catch(e) {}
    </script>

    <style>
      /* Critical CSS — ensures page is never black even if stylesheet fails to load */
      *, *::before, *::after { box-sizing: border-box; }
      html { color-scheme: light !important; background: #ffffff !important; }
      body { margin: 0; padding: 0; background: #ffffff !important; color: #111827 !important; font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-text-size-adjust: 100%; }
      #root { min-height: 100vh; background: #ffffff !important; }
      #loader { position: fixed; inset: 0; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 9999; }
      #loader-spin { width: 36px; height: 36px; border: 4px solid #e5e7eb; border-top-color: #1d4ed8; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @media (prefers-color-scheme: dark) {
        html, body, #root, #loader { background: #ffffff !important; color: #111827 !important; filter: none !important; }
      }
    </style>
  </head>

  <body>
    <!-- Loading screen — removed by React after mount -->
    <div id="loader"><div id="loader-spin"></div></div>

    <!-- Google Translate container — outside React root -->
    <div id="google_translate_element" style="display:none;position:absolute"></div>

    <div id="root"></div>

    <!-- Fallback shown if JavaScript is disabled or fails to load -->
    <noscript>
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#fff;font-family:sans-serif;text-align:center;padding:20px">
        <div>
          <h1 style="color:#1d4ed8;font-size:24px;margin-bottom:12px">Preparedness for War</h1>
          <p style="color:#666;margin-bottom:20px">Please enable JavaScript to use this site.</p>
          <a href="https://preparednessforwar.onrender.com" style="background:#1d4ed8;color:#fff;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:bold">Reload</a>
        </div>
      </div>
    </noscript>

    <script type="module" src="/src/main.tsx"></script>

    <!-- Google Translate — loaded last, async, won't block page -->
    <script>
      window.googleTranslateElementInit = function() {
        try {
          new window.google.translate.TranslateElement({
            pageLanguage: 'en', autoDisplay: false
          }, 'google_translate_element');
        } catch(e) {}
      };
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async defer></script>
  </body>
</html>
